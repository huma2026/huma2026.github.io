- title: wuliu
  name: Wu Liu
  subtitle: University of Science and Technology of China
  img: wuliu.jpg
  thumbnail: wuliu.jpg
  alt: Picture of TBD
  topic: Topic
  description: Wu Liu is a Special Professor at the University of Science and Technology of China and has been selected for the National Young Talents Program. He has published over 100 papers in prestigious international conferences and journals and has received best paper awards from IEEE TMM, IEEE MM, and IEEE ICME, among others. He received the CAAI Wu Wenjun Artificial Intelligence Science and Technology Progress Special Award, Tianjin Science and Technology Progress Special Award, ACM China Rising Star Award, Chinese Academy of Sciences (CAS) Outstanding Doctoral Dissertation Award, and CAS Special Prize of the President Award. He has been recognized as one of MIT Technology Review's ``Innovators Under 35 Asia Pacific,'' selected for the Beijing Science and Technology Rising Star Program, and named as a Zhongguancun Forum-AI100 Youth Pioneer. He serves as an Associate Editor for IEEE TMM and Pattern Recognition, Technical Program Chair for IEEE ICME 2022 and ACM MM Asia 2021, and Organizing Committee Chair for the 2025 China Multimedia Conference. He is also selected as IET Fellow and a member of the IET Fellow Review Committee. He is also an ACM Senior Member.

- title: Yutong Gao
  name: Yutong Gao
  subtitle: Minzu University of China
  img: gao.jpg
  thumbnail: gao.jpg
  alt: Picture of TBD
  topic: Topic
  description: Yutong Gao is an Associate Research Fellow at the School of Information Engineering, Minzu University of China. He received his Ph.D. degree in Computer Science and Technology from Beijing Jiaotong University in 2023, and was a Visiting Researcher at the Institute for Infocomm Research (I2R), Agency for Science, Technology and Research (A*STAR), Singapore, from 2021 to 2022. He received his M.S. degree from National Taipei University of Technology in 2017 and his B.S. degree from Northeastern University, China. His research interests focus on computer vision and machine learning, particularly semantic understanding and generation of visual content, including interactive semantic segmentation, motion generation, weakly supervised learning, image colorization, and zero-shot learning. He has published more than 30 papers in national journals and conferences, including IEEE TNNLS, IEEE TMM, PR, ACL, ICCV, EMNLP, etc. He has led and participated in 12 Chinese national and provincial research projects, and currently serves as a Young Editorial Board Member of Exploration.

- title: xinchenliu
  name: Xinchen Liu
  subtitle: JD AI Research, Beijing, China
  img: xinchenliu.jpg
  thumbnail: xinchenliu.jpg
  alt: Picture of TBD
  topic: Topic
  description: Xinchen Liu is a Senior Researcher and the Head of the Foundational Video Intelligence Laboratory at JD Explore Academy, China. His current research interests include Multimedia Large Language Model (MLLM) and AI Generated Content (AIGC). He received his Ph.D. degree in Computer Science from the School of Computer Science, Beijing University of Posts and Telecommunications in 2018. He has published more than 40 papers in top-tier conferences and journals in computer vision and multimedia. He received the 2024 Wu Wenjun Artificial Intelligence Science and Technology Progress Award from the Chinese Association for Artificial Intelligence, IEEE TMM 2019 Prize Paper Award, IEEE ICME 2016 Best Student Paper Award, and Outstanding Doctoral Dissertation Award of China Society of Image and Graphics in 2019. Dr. Liu has also served as the Area Chair of IEEE ICME 2022\&2024, Proceedings Co-Chair of ACM MM Asia 2021. He also organized the workshops in ACM MM 2020--2024.

- title: Zhaochun Ren
  name: Zhaochun Ren
  subtitle: Leiden University
  img: ren.jpg
  thumbnail: ren.jpg
  alt: Picture of TBD
  topic: Topic
  description: Zhaochun Ren is an Associate Professor at Leiden University. His research interests focus on joint research problems in information retrieval and natural language processing, with an emphasis on generative retrieval, conversational information seeking, agentic retrieval, and recommender systems. He aims to develop intelligent systems that can address complex user requests and solve core challenges in both information retrieval and natural language processing towards that goal. In addition to his academic experience, he worked on e-commerce search and recommendation at JD.com for over 2 years. He has co-organized workshops at SIGIR (2020), CIKM (2025), ECIR (2024--2026), SIGIR-AP (2024--2025), and WSDM (2019, 2020).

- title: hongyuanzhu
  name: Hongyuan Zhu
  subtitle: Agency for Science, Technology, and Research (A*STAR), Singapore
  img: hongyuanzhu.png
  thumbnail: hongyuanzhu.png
  alt: Picture of TBD
  topic: Topic
  description: Hongyuan Zhu is a senior scientist and PI in the Institute for Infocomm Research (I2R), at the Agency for Science, Technology and Research (A*STAR), Singapore. He received his Ph.D. from Nanyang Technological University (NTU), Singapore, in 2015. He is leading the Advanced Perception and Reasoning Lab with research interests in developing autonomous agents with super large-scale multi-modal sensing and reasoning capabilities for a series of use cases in manufacturing, cybersecurity and defence. He was selected as the top 2\% scientist by Stanford in 2023 and was the recipient of A*STAR Career Award in 2022. His team won the 1st place winner of Scene2Cap challenge, ICCV2023, 3rd place of EPIC-Kitchen Text-Video Retrieval, the only Asia team as 1st Prize Finalist of KUKA Innovation Challenge 2021. He is currently the associate editor of Visual Computer since 2020. He also served as the Area Chair of ACM MM Asia 2022, Senior Program Committee of IJCAI 2021, and the Guest Editor of IET Image Processing in 2018. He has published around 90 top-tier journal and conference papers, such as CVPR, ICCV, NeurIPS, ICML, AAAI, IJCAI, ACL, TPAMI, etc.

- title: jingkuansong
  name: Jingkuan Song
  subtitle: School of Computer Science and Technology, Tongji University
  img: song.jpg
  thumbnail: song.jpg
  alt: Picture of TBD
  topic: Topic
  description: Jingkuan Song is a full professor with the School of Computer Science and Technology at Tongji University. His research interests include large-scale multimedia retrieval, image/video segmentation and understanding using techniques such as hashing, graph learning, and deep learning. He was a Postdoc Research Scientist at Columbia University (2016--2017) and a Research Fellow at the University of Trento (2014--2016). He obtained his Ph.D. degree in 2014 from The University of Queensland, Australia. He was the winner of the Best Paper Award at ICPR 2016, the Best Student Paper Award at the Australian Database Conference 2017, and the ACM SIGMM Rising Star Award in 2021. Jingkuan has served as the Demo Chair of ACM MM Asia 2020, Workshop Chair of APWeb 2019, and the Area Chair of ACM MM 2018-2023, among others. He serves as an Associate Editor for IEEE TMM and ACM TOMM, and has been a Guest Editor for TMM, PR, and a PC member for CVPR, ACM MM, IJCAI, etc. (2018--2023).

- title: Jiebo Luo
  name: Jiebo Luo
  subtitle: University of Rochester
  img: luo.jpg
  thumbnail: luo.jpg
  alt: Picture of TBD
  topic: Topic
  description: Jiebo Luo is the Albert Arendt Hopeman Professor of Engineering and a Professor of Computer Science at the University of Rochester, which he joined in 2011 after a prolific 15-year career at Kodak Research Laboratories. He received his Ph.D. from the University of Rochester. His research spans computer vision, natural language processing, machine learning, data mining, computational social science, and digital health. He has authored more than 600 technical papers and holds over 90 U.S. patents. He is a Fellow of the National Academy of Inventors (NAI), ACM, AAAI, SPIE, IAPR, and Academia Europaea. He received the 2021 ACM SIGMM Award for Outstanding Technical Contributions to Multimedia Computing, Communications and Applications, the 2024 Debra Haring Excellence in Research Award, and the 2024 William H. Riker University Award for Excellence in Graduate Teaching. He has served as Program Co-Chair for ACM Multimedia 2010, IEEE CVPR 2012, ACM ICMR 2016, and IEEE ICIP 2017, and General Co-Chair for ACM Multimedia 2018 and IEEE ICME 2024. He served on the editorial boards of IEEE TPAMI, IEEE TMM, IEEE TCSVT, IEEE TBD, ACM TIST, PR, KAIS, MVA, etc. and was the Editor-in-Chief of IEEE TMM from 2020 to 2022. 


